<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AskEdie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    #chat-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #chatbox {
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 75%;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 0;
    }

    .bot {
      align-self: flex-start;
      background: #eaeaea;
      color: #333;
      border-bottom-left-radius: 0;
    }

    #inputArea {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div id="chat-container">
    <h1>AskEdie</h1>
    <h3>Here to help you understand EDS</h3>

    <div id="chatbox"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Type a message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // --- Ellie’s knowledge (loaded from JSON) ---
    let ellieKnowledge = {};

    async function loadEllieKnowledge() {
      try {
        const res = await fetch("ellie-knowledge.json");
        ellieKnowledge = await res.json();
      } catch (e) {
        console.error("Could not load Ellie knowledge:", e);
        ellieKnowledge = {};
      }
    }

    // --- Chat bubble helper ---
    function addBubble(text, sender) {
      const chatbox = document.getElementById("chatbox");

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.classList.add(sender); // "user" or "bot"
      bubble.textContent = text;

      chatbox.appendChild(bubble);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    // --- Ellie’s “brain” using the knowledge file ---
    function ellieReply(userText) {
      const msg = userText.toLowerCase();

      // Safety / disclaimer
      if (msg.includes("diagnose") || msg.includes("diagnosis") || msg.includes("should i") || msg.includes("treatment")) {
        if (ellieKnowledge.disclaimer) {
          return "Ellie: " + ellieKnowledge.disclaimer + " If you're worried about symptoms, please talk to a medical professional.";
        }
      }

      // Greetings
      if (msg.includes("hi") || msg.includes("hello") || msg.includes("hey")) {
        return "Ellie: Hi! What would you like to know about EDS?";
      }

      // What is EDS
      if (msg.includes("what is eds") || msg.includes("what's eds") || (msg.includes("eds") && msg.includes("what"))) {
        if (ellieKnowledge.eds_overview) {
          return "Ellie: " + ellieKnowledge.eds_overview;
        }
      }

      // Symptoms
      if (msg.includes("symptom") || msg.includes("signs") || msg.includes("look for")) {
        if (ellieKnowledge.symptoms) {
          return "Ellie: Common symptoms people talk about include: " + ellieKnowledge.symptoms.join(", ") + ".";
        }
      }

      // Management / treatment (general)
      if (msg.includes("manage") || msg.includes("management") || msg.includes("help with") || msg.includes("cope")) {
        if (ellieKnowledge.management) {
          return "Ellie: " + ellieKnowledge.management + " " + (ellieKnowledge.disclaimer || "");
        }
      }

      // Ask about sources
      if (msg.includes("source") || msg.includes("website") || msg.includes("where did you get this")) {
        if (ellieKnowledge.trusted_sources) {
          return "Ellie: I base my explanations on trusted resources like: " + ellieKnowledge.trusted_sources.join(", ") + ".";
        }
      }

      // Fallback
      return "Ellie: I might not know that specific thing yet, but I can explain EDS basics, symptoms, or general management if you ask.";
    }

    // --- Send message handler ---
    async function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (!text) return;

      addBubble(text, "user");
      input.value = "";

      const reply = ellieReply(text);
      addBubble(reply, "bot");
    }

    // --- Enter key sends message ---
    document.getElementById("msg").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    // --- On page load: load knowledge + first message ---
    window.onload = async function() {
      await loadEllieKnowledge();
      addBubble("Hi! I'm EDAssist — but you can call me Ellie. I can help you understand EDS in a gentle, clear way.", "bot");
    };
  </script>
</body>
</html>
