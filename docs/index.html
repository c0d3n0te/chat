<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AskEdie</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    #chat-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #chatbox {
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 75%;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 0;
    }

    .bot {
      align-self: flex-start;
      background: #eaeaea;
      color: #333;
      border-bottom-left-radius: 0;
    }

    #inputArea {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div id="chat-container">
    <h1>AskEdie</h1>
    <h3>Here to help you understand EDS</h3>

    <div id="chatbox"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Type a message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    /* -----------------------------
       LOAD EDIE'S KNOWLEDGE FILE
    ------------------------------*/
    let edieKnowledge = {};

    async function loadEdieKnowledge() {
      try {
        const res = await fetch("edie-knowledge.json");
        edieKnowledge = await res.json();
      } catch (e) {
        console.error("Could not load Edie knowledge:", e);
        edieKnowledge = {};
      }
    }

    /* -----------------------------
       ADD CHAT BUBBLE
    ------------------------------*/
    function addBubble(text, sender) {
      const chatbox = document.getElementById("chatbox");

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.classList.add(sender);
      bubble.textContent = text;

      chatbox.appendChild(bubble);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    /* -----------------------------
       EDIE'S BRAIN (RULE-BASED)
    ------------------------------*/
    function edieReply(userText) {
      const msg = userText.toLowerCase();

      // Safety / disclaimer
      if (msg.includes("diagnose") || msg.includes("should i") || msg.includes("treatment")) {
        return (edieKnowledge.disclaimer || "I can explain EDS, but I can't diagnose or give medical advice.");
      }

      // Greetings
      if (msg.includes("hi") || msg.includes("hello") || msg.includes("hey")) {
        return "Hi! What would you like to know about EDS?";
      }

      // What is EDS?
      if (msg.includes("what is eds") || msg.includes("what's eds") || (msg.includes("eds") && msg.includes("what"))) {
        return (edieKnowledge.eds_overview || "EDS is a group of connective tissue disorders.");
      }

      // Symptoms
      if (msg.includes("symptom") || msg.includes("signs")) {
        return "Common symptoms include: " + (edieKnowledge.symptoms?.join(", ") || "joint hypermobility and chronic pain") + ".";
      }

      // Management
      if (msg.includes("manage") || msg.includes("cope") || msg.includes("help with")) {
        return (edieKnowledge.management || "Management usually focuses on physical therapy and joint protection.") 
          + " " 
          + (edieKnowledge.disclaimer || "");
      }

      // Sources
      if (msg.includes("source") || msg.includes("website")) {
        return "I use trusted resources like: " + (edieKnowledge.trusted_sources?.join(", ") || "official EDS websites") + ".";
      }

      // Fallback
      return "I'm not sure about that yet, but I can explain EDS basics, symptoms, or general management if you'd like.";
    }

    /* -----------------------------
       SEND MESSAGE
    ------------------------------*/
    async function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (!text) return;

      addBubble(text, "user");
      input.value = "";

      const reply = edieReply(text);
      addBubble(reply, "bot");
    }

    /* -----------------------------
       ENTER KEY HANDLER
    ------------------------------*/
    document.getElementById("msg").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    /* -----------------------------
       ON PAGE LOAD
    ------------------------------*/
    window.onload = async function() {
      await loadEdieKnowledge();
      addBubble("Hi! I'm Edie. How may I assist you today?", "bot");
    };
  </script>
</body>
</html>
