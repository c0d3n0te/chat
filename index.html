<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- title that appears in the browser tab -->
  <title>AskEdie</title>

  <!-- basic styling for layout and appearance -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    /* Chat container */
    #chat-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* Chat history area */
    #chatbox {
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Shared bubble styling */
    .bubble {
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 75%;
      line-height: 1.4;
    }

    /* User bubble (right side) */
    .user {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 0;
    }

    /* Bot bubble (left side) */
    .bot {
      align-self: flex-start;
      background: #eaeaea;
      color: #333;
      border-bottom-left-radius: 0;
    }

    /* Input + Button Container */
    #inputArea {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    /* Text Input Field */
    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    /* Send Button */
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <!-- Page Title -->
  <div id="chat-container">
    <h1>AskEdie</h1>
    <h3>Here to help you understand EDS</h3>

    <!-- Chat History Display -->
    <div id="chatbox"></div>

    <!-- User Input Area -->
    <div id="inputArea">
      <input id="msg" placeholder="Type a message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    /* Adds a chat bubble to the chatbox */
    function addBubble(text, sender) {
      const chatbox = document.getElementById("chatbox");
  
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.classList.add(sender); // "user" or "bot"
      bubble.textContent = text;
  
      chatbox.appendChild(bubble);
  
      // Auto-scroll to bottom
      chatbox.scrollTop = chatbox.scrollHeight;
    }
  
    /* Runs when the user clicks "Send" */
    async function sendMessage() {
      const input = document.getElementById("msg");
      const text = input.value.trim();
  
      if (!text) return;
  
      addBubble(text, "user");
      input.value = "";
  
      /* Temporary bot reply
      addBubble("(waiting for backend...)", "bot");*/
      const res = await fetch("YOUR_BACKEND_URL/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      
      const data = await res.json();
      addBubble("Ellie: " + data.response, "bot");

    }
  
    // Allow pressing Enter to send the message
    document.getElementById("msg").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    // Bot sends a message first when the page loads
    window.onload = function() {
      addBubble("Hello! I'm Edie. How can I assist you today?", "bot");
    };
    
  </script>
  
</body>
</html>
