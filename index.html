<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- title that appears in the browser tab -->
  <title>EDAssist</title>
  <!-- basic styling for layout and appearance -->
  <!-- will change later -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    /* Chat Display Area */
    #chatbot {
      width: 100%;
      height: 400px;
      background: white;
      border: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;        /* enables scrolling */
      white-space: pre-wrap;   /* keeps line breaks */
    }
      /* Input + Button Container */
    #inputArea {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    /* Text Input Fieldd */
    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    /* Send Button */
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Page Title -->
  <h1>EDAssist</h1>
  <!-- Chat History Display -->
  <div id = "chatbox"></div>
  <!-- User Input Area -->
  <div id="inputArea">
    <input id="msg" placeholder = "Type a message">
    <button onclick="sendMessage()">Send</button>
  </div>
  <script>
    // This function runs when the user clicks "Send"
    async function sendMessage() {
      const input = document.getElementById("msg");
      const chatbox = document.getElementById("chatbox");
      const text = input.value.trim();
      // Ignore empty messages
      if (!text) return;
      // Show the user's message in the chatbox
      chatbox.textContent += "You: " + text + "\n";
      // Clear the unput field
      input.value = "";
      // TEMPORARY: Fake bot reply until backend is added :)
      chatbox.textContent += "Bot: (waiting for backend...)\n\n";
      /* WHEN BACKEND ADDED:
      const res = await fetch("YOUR_BACKEND_URL/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      chatbox.textContent += "Bot: " + data.response + "\n\n";
      */
  </script>
</body>
</html>
